<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000; /* Solid black background */
            color: white;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #chart-container {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            background-color: #000;
        }
        #status {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: sans-serif;
            color: #555;
            z-index: 1;
        }
        .controls {
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
            background: #111;
            z-index: 100;
        }
        button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            elevation: 5;
        }
        .buy { background-color: #26a69a; }
        .sell { background-color: #ef5350; }
        .buy:active { background-color: #1e857b; }
        .sell:active { background-color: #d32f2f; }
    </style>
</head>
<body>
    <div id="status">Loading Chart...</div>
    <div id="chart-container"></div>
    <div class="controls">
        <button class="buy" onclick="handleTrade('buy')">BUY</button>
        <button class="sell" onclick="handleTrade('sell')">SELL</button>
    </div>

    <!-- Use the specific version to avoid redirects and speed up loading -->
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

    <script>
        function handleTrade(type) {
            console.log('Trade action:', type);
            alert(type.toUpperCase() + " button clicked!");
            // Integration with Android can be added here via JavascriptInterface if needed
        }

        window.onload = function() {
            if (typeof LightweightCharts === 'undefined') {
                document.getElementById('status').innerText = 'Error: LightweightCharts not loaded. Check Internet.';
                document.getElementById('status').style.color = 'red';
                return;
            }

            document.getElementById('status').style.display = 'none';

            const chartOptions = {
                layout: {
                    textColor: '#d1d4dc',
                    background: { type: 'solid', color: '#000000' },
                },
                grid: {
                    vertLines: { color: 'rgba(42, 46, 57, 0.5)' },
                    horzLines: { color: 'rgba(42, 46, 57, 0.5)' },
                },
                timeScale: {
                    timeVisible: true,
                    secondsVisible: false,
                },
                handleScroll: true,
                handleScale: true,
            };

            const container = document.getElementById('chart-container');
            const chart = LightweightCharts.createChart(container, chartOptions);
            const candleSeries = chart.addCandlestickSeries({
                upColor: '#26a69a',
                downColor: '#ef5350',
                borderVisible: false,
                wickUpColor: '#26a69a',
                wickDownColor: '#ef5350',
            });

            // Generate some dummy data
            const data = [];
            let lastTime = Math.floor(Date.now() / 1000) - 150 * 60;
            let lastClose = 50000;

            for (let i = 0; i < 150; i++) {
                const open = lastClose + (Math.random() - 0.5) * 100;
                const high = open + Math.random() * 50;
                const low = open - Math.random() * 50;
                const close = (high + low) / 2 + (Math.random() - 0.5) * 50;
                data.push({ time: lastTime, open, high, low, close });
                lastTime += 60;
                lastClose = close;
            }

            candleSeries.setData(data);

            // Responsive resize
            const resizeObserver = new ResizeObserver(entries => {
                if (entries.length === 0 || !entries[0].contentRect) return;
                const { width, height } = entries[0].contentRect;
                chart.applyOptions({ width, height });
            });
            resizeObserver.observe(container);
        };
    </script>
</body>
</html>
